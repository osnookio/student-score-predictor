<form action="/predict" method="POST">

    <input type="number"
           name="hours"
           step="0.1"
           placeholder="Study Hours"
           required>

    <input type="number"
           name="attendance"
           step="0.1"
           placeholder="Attendance (%)"
           required>

    <button type="submit">
        Predict
    </button>

</form>

<h2>{{ prediction_text }}</h2>
