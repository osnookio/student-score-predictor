<!DOCTYPE html>
<html>
<head>
    <title>Student Score Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <h1>Student Score Predictor</h1>
        <p>Predict exam scores using study hours and attendance.</p>

        <form action="/predict" method="POST">

            <input type="number"
                   name="hours"
                   placeholder="Study Hours"
                   required>

            <input type="number"
                   name="attendance"
                   placeholder="Attendance %"
                   required>

            <button type="submit">
                Predict Score
            </button>

        </form>

        {% if prediction %}
        <div class="result">
            Predicted Score: {{ prediction }}
        </div>
        {% endif %}
    </div>

</body>
</html>
