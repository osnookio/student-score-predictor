{% extends "base.html" %}
{% block title %}Sign Up – ScoreIQ{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">✏️</div>
      <h1>Create account</h1>
      <p>Start predicting your performance today</p>
    </div>

    <form method="POST" action="{{ url_for('signup') }}" class="auth-form">
      <div class="field">
        <label for="name">Full name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required />
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min. 6 characters" minlength="6" required />
      </div>
      <button type="submit" class="btn-primary">Create account →</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
  </div>

  <div class="auth-visual">
    <div class="visual-stat"><span class="big-num">📊</span><span class="label">ML-powered predictions</span></div>
    <div class="visual-stat"><span class="big-num">🔒</span><span class="label">Secure &amp; private</span></div>
    <p class="visual-tagline">"Your academic future, predicted now."</p>
  </div>
</div>
{% endblock %}
